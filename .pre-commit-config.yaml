repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Prettier YAML
        types: [yaml]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        args:
          [
            "--fix",
            "--config",
            "pyproject.toml",
            "--configPointer",
            "/tool/markdown/lint",
          ]
        types: [markdown]
        exclude: "(^|/)CLAUDE\\.md$"

  - repo: local
    hooks:
      - id: format
        name: make format
        entry: make format
        language: system
        pass_filenames: false

      - id: lint
        name: make lint
        entry: make lint
        language: system
        pass_filenames: false
